<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Matches the Roasdriven wordmark dot: a near-black rounded square (25% corner
       radius, like the 8px/2px logo dot). Swaps to a light fill on dark browser
       chrome so the favicon stays visible in either tab theme. -->
  <style>
    rect { fill: #0C0A09; }
    @media (prefers-color-scheme: dark) { rect { fill: #FAFAF9; } }
  </style>
  <rect x="4" y="4" width="24" height="24" rx="6" />
</svg>
