<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset password &mdash; Helm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="auth-shell">
    <header class="auth-nav">
      <a href="index.html" class="wordmark">
        <span class="wordmark-dot"></span>
        Helm
      </a>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <div style="text-align: center; margin-bottom: 32px;">
          <h2>Reset your password</h2>
          <p class="mt-8 text-sm">Enter the email on your account. We&rsquo;ll send a reset link.</p>
        </div>

        <form class="flex flex-col gap-12" onsubmit="event.preventDefault(); document.getElementById('sent-state').style.display = 'block'; this.style.display = 'none';">
          <div class="field">
            <label class="field-label" for="email">Email</label>
            <input class="input" id="email" type="email" placeholder="you@agency.com" required />
          </div>
          <button type="submit" class="btn btn-primary btn-lg w-full mt-8">Send reset link</button>
        </form>

        <div id="sent-state" style="display: none; text-align: center;">
          <div class="tag tag-success" style="margin-bottom: 16px;">Email sent</div>
          <p class="text-sm">If an account exists for that email, a reset link is on its way. The link expires in 30 minutes.</p>
        </div>

        <div class="mt-32" style="text-align: center;">
          <p class="text-xs muted">
            <a href="login.html" style="color: var(--text); font-weight: 500;">&larr; Back to sign in</a>
          </p>
        </div>
      </div>
    </main>

    <footer class="auth-footer">
      <div class="flex items-center justify-between">
        <span>&copy; 2026 Nova Solution</span>
        <span>Helm v1.0</span>
      </div>
    </footer>
  </div>

</body>
</html>
