<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Set new password &mdash; Helm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="auth-shell">
    <header class="auth-nav">
      <a href="index.html" class="wordmark">
        <span class="wordmark-dot"></span>
        Helm
      </a>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <div style="text-align: center; margin-bottom: 32px;">
          <h2>Choose a new password</h2>
          <p class="mt-8 text-sm">For <strong style="color: var(--text); font-weight: 500;">you@agency.com</strong></p>
        </div>

        <form class="flex flex-col gap-12" onsubmit="event.preventDefault(); window.location.href='login.html';">
          <div class="field">
            <label class="field-label" for="password">New password</label>
            <input class="input" id="password" type="password" placeholder="At least 12 characters" autocomplete="new-password" required />
            <span class="field-hint">12 characters minimum. Mix of letters, numbers, and a symbol.</span>
          </div>

          <div class="field">
            <label class="field-label" for="confirm">Confirm password</label>
            <input class="input" id="confirm" type="password" autocomplete="new-password" required />
          </div>

          <button type="submit" class="btn btn-primary btn-lg w-full mt-8">Update password</button>
        </form>

        <div class="mt-32" style="text-align: center;">
          <p class="text-xs muted">
            <a href="login.html" style="color: var(--text); font-weight: 500;">&larr; Back to sign in</a>
          </p>
        </div>
      </div>
    </main>

    <footer class="auth-footer">
      <div class="flex items-center justify-between">
        <span>&copy; 2026 Nova Solution</span>
        <span>Helm v1.0</span>
      </div>
    </footer>
  </div>

</body>
</html>
